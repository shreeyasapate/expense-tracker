<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">✏️ Edit Expense</h1>

    <div class="card shadow-lg p-4">

        <form action="/update-expense/{{ expense[0] }}" method="POST">

            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input
                    type="number"
                    name="amount"
                    class="form-control"
                    value="{{ expense[1] }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>

                <select name="category" class="form-select">

                    <option {% if expense[2]=='Food' %}selected{% endif %}>Food</option>
                    <option {% if expense[2]=='Travel' %}selected{% endif %}>Travel</option>
                    <option {% if expense[2]=='Shopping' %}selected{% endif %}>Shopping</option>
                    <option {% if expense[2]=='Bills' %}selected{% endif %}>Bills</option>
                    <option {% if expense[2]=='Education' %}selected{% endif %}>Education</option>
                    <option {% if expense[2]=='Entertainment' %}selected{% endif %}>Entertainment</option>
                    <option {% if expense[2]=='Health' %}selected{% endif %}>Health</option>
                    <option {% if expense[2]=='Other' %}selected{% endif %}>Other</option>

                </select>

            </div>

            <div class="mb-3">
                <label class="form-label">Date</label>

                <input
                    type="date"
                    name="date"
                    class="form-control"
                    value="{{ expense[3] }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">Description</label>

                <textarea
                    name="description"
                    class="form-control"
                    rows="4">{{ expense[4] }}</textarea>

            </div>

            <button class="btn btn-primary w-100">
                💾 Update Expense
            </button>

        </form>

    </div>

</div>

</body>
</html>
